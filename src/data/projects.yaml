        description: "公司全员从 Cursor 切换到 AtomCode"

  - id: reasonix
    name: deepseek-reasonix
    category: agent
    repo: https://github.com/esengine/deepseek-reasonix
    website: https://reasonix.dev
    description: "DeepSeek 原生优化的终端 Coding Agent，缓存优先架构实现 99.82% 缓存命中率。含桌面 GUI、MCP 原生支持、Skills 系统。"
    lastReviewed: "2026-05-26"
    scores:
      community: 85
      engineering: 75
      model_compat: 30
      security: 65
      ux: 80
      ecosystem: 80
    communityData:
      stars: 8684
      forks: 470
      contributors: 54
      openIssues: 176
      lastCommit: "2026-05-25"
    tags: ["TypeScript", "Coding Agent", "DeepSeek", "MIT", "MCP", "Desktop GUI"]
    analysis:
      strengths: >
        社区最大（7,129 stars），49 个 contributors，迭代速度极快。
        缓存优先架构是杀手级特性——真实案例 99.82% 缓存命中率，Token 成本降低 80%。
        桌面 GUI + TUI 双模式，npm 安装零门槛。
      weaknesses: >
        DeepSeek 独占，无法切换其他模型。176 个 open issues 积压。
        无 undo 机制，安全防护主要靠 hooks 而非内置。
      positioning: >
        DeepSeek 原生优化的 Coding Agent，缓存架构将 DeepSeek 的低价优势放大到极致。
        适合已选定 DeepSeek 的团队。
      audience: >
        DeepSeek 用户、追求极致 Token 成本控制的独立开发者、
        需要桌面 GUI 的非终端用户。
    milestones:
      - date: "2025-Q4"
        title: "项目启动"
        description: "DeepSeek 原生 Agent 起步"
      - date: "2026-05"
        title: "v0.49 发布"
        description: "高频迭代，社区最大 Coding Agent"

  - id: kaku
    name: Kaku
    category: terminal
    repo: https://github.com/tw93/Kaku
    description: "macOS 原生 AI 终端模拟器，WezTerm 深度定制分支。40% 体积缩减、AI 辅助内建、零配置开箱即用。"
    lastReviewed: "2026-05-26"

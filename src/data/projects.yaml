projects:
  - id: atomcode
    name: AtomCode
    category: agent
    repo: https://github.com/atomgit-atomcode/atomcode
    website: https://atomcode.atomgit.com
    description: "纯 Rust 开源 Coding Agent，小模型友好，MIT 许可。内置 Agent Loop、代码图谱、MCP 支持、多 Provider 切换，支持 8 个 LLM Provider。"
    scores:
      community: 15
      engineering: 70
      model_compat: 85
      security: 80
      ux: 55
      ecosystem: 75
    communityData:
      stars: 116
      forks: 17
      contributors: 37
      openIssues: 1
      lastCommit: "2026-05-24"
    tags: ["Rust", "Coding Agent", "Multi-Provider", "MIT", "MCP"]
    analysis:
      strengths: >
        AtomCode 是目前唯一将「小模型友好」作为原生设计的 Coding Agent。
        8 个 LLM Provider 支持、MIT 开源、完善的权限模型（危险命令拦截、敏感文件保护、undo 快照）
        使其在安全治理和模型兼容性上表现突出。
      weaknesses: >
        社区刚起步（100 stars），无正式 Release 和预编译二进制，
        纯 TUI 对非终端用户有学习门槛，JetBrains 无插件。
      positioning: >
        中国第一个「用 Harness Engineering 方式造出的 Harness Engineering 工具」。
        哲学上对标 Claude Code 的「大刀阔斧」，AtomCode 走「丰田精益生产」路线
        ——每一步可干预、可回滚。
      audience: >
        重视模型选择自由度和成本控制的中国开发者；
        希望在 CLI 中完成全流程 AI 编码的工程师。
    milestones:
      - date: "2026-03-19"
        title: "项目启动"
        description: "单人 Scaffold 搭建"
      - date: "2026-04-18"
        title: "全量开源发布"
        description: "AtomCode CLI 开源"
      - date: "2026-05-16"
        title: "生态扩张"
        description: "AtomCode Air + 代码审计上线"
      - date: "2026-05-21"
        title: "全员切换"
        description: "公司全员从 Cursor 切换到 AtomCode"

  - id: reasonix
    name: deepseek-reasonix
    category: agent
    repo: https://github.com/esengine/deepseek-reasonix
    website: https://reasonix.dev
    description: "DeepSeek 原生优化的终端 Coding Agent，缓存优先架构实现 99.82% 缓存命中率。含桌面 GUI、MCP 原生支持、Skills 系统。"
    scores:
      community: 85
      engineering: 75
      model_compat: 30
      security: 65
      ux: 80
      ecosystem: 80
    communityData:
      stars: 8684
      forks: 470
      contributors: 54
      openIssues: 176
      lastCommit: "2026-05-25"
    tags: ["TypeScript", "Coding Agent", "DeepSeek", "MIT", "MCP", "Desktop GUI"]
    analysis:
      strengths: >
        社区最大（7,129 stars），49 个 contributors，迭代速度极快。
        缓存优先架构是杀手级特性——真实案例 99.82% 缓存命中率，Token 成本降低 80%。
        桌面 GUI + TUI 双模式，npm 安装零门槛。
      weaknesses: >
        DeepSeek 独占，无法切换其他模型。176 个 open issues 积压。
        无 undo 机制，安全防护主要靠 hooks 而非内置。
      positioning: >
        DeepSeek 原生优化的 Coding Agent，缓存架构将 DeepSeek 的低价优势放大到极致。
        适合已选定 DeepSeek 的团队。
      audience: >
        DeepSeek 用户、追求极致 Token 成本控制的独立开发者、
        需要桌面 GUI 的非终端用户。
    milestones:
      - date: "2025-Q4"
        title: "项目启动"
        description: "DeepSeek 原生 Agent 起步"
      - date: "2026-05"
        title: "v0.49 发布"
        description: "高频迭代，社区最大 Coding Agent"

  - id: kaku
    name: Kaku
    category: terminal
    repo: https://github.com/tw93/Kaku
    description: "macOS 原生 AI 终端模拟器，WezTerm 深度定制分支。40% 体积缩减、AI 辅助内建、零配置开箱即用。"
    scores:
      community: 70
      engineering: 80
      model_compat: null
      security: null
      ux: 85
      ecosystem: 50
    communityData:
      stars: 5172
      forks: 254
      contributors: 43
      openIssues: 4
      lastCommit: "2026-05-24"
    tags: ["Rust", "Terminal", "macOS", "WezTerm Fork", "AI Assistant"]
    analysis:
      strengths: >
        macOS 终端体验天花板。40% 体积缩减（40MB vs 67MB），
        零配置开箱即用，内建 AI 辅助（错误恢复 + 自然语言转命令）。
        5,165 stars，社区认可度极高。
      weaknesses: >
        macOS 独占，无 Windows/Linux 支持。
        作为 WezTerm fork，依赖上游更新节奏。
        非独立 Coding Agent，不参与模型兼容性和安全治理维度评估。
      positioning: >
        AI 时代的终端——不是替代 Coding Agent，而是让终端本身更智能。
        与 Waza 互补，共同构成 tw93 的「编码 + 技能」生态。
      audience: >
        macOS 开发者、重度终端用户、需要 AI 辅助命令行的工程师。
    milestones:
      - date: "2025"
        title: "项目启动"
        description: "WezTerm 深度定制分支"
      - date: "2026-05"
        title: "成熟阶段"
        description: "5K+ stars，macOS AI 终端标杆"

  - id: waza
    name: Waza
    category: skills
    repo: https://github.com/tw93/Waza
    description: "8 个 AI Agent 技能（Slash Commands）集合，编码工程纪律到可重复工作流。跨 Claude Code/Codex/Pi/Desktop 通用。"
    scores:

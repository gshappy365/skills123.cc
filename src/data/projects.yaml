      ecosystem: 85
    communityData:
      stars: 5169
      forks: 306
      contributors: 8
      openIssues: 0
      lastCommit: "2026-05-25"
    tags: ["Python", "Skills", "Claude Code", "MIT", "Cross-Platform"]
    analysis:
      strengths: >
        跨 Agent 通用（Claude Code / Codex / Pi / Desktop），
        8 个技能覆盖编码全流程（规划、调试、Review、发布）。
        MIT 开源，5,060 stars，0 open issues 说明维护质量高。安装简单（npx skills add）。
      weaknesses: >
        本身不是 Agent，依赖宿主 Agent 的安全机制。
        Python 脚本维护成本。技能数量有限（8 个），扩展依赖社区贡献。
      positioning: >
        「工程纪律的编码器」——将 think → design → code → check 的最佳实践
        沉淀为可复用技能。不是替代 Coding Agent，而是让任何 Agent 更规范。
      audience: >
        所有使用 AI Coding Agent 的工程师，特别是希望建立结构化工作流的团队。
    milestones:
      - date: "2025"
        title: "项目启动"
        description: "Claude Code 技能集合"
      - date: "2026-05"
        title: "生态扩展"
        description: "跨 Agent 支持，5K+ stars"

  - id: meta-kim
    name: Meta_Kim
    category: governance
    repo: https://github.com/KimYx0207/Meta_Kim
    description: "AI Coding Agent 治理层。9 个 Specialist Meta-Agents、8 阶段执行骨架、3 层记忆系统、动态 Dealing Cards。将 AI 编码从「执行」升级到「治理」。"
    scores:
      community: 10
      engineering: 60
      model_compat: null
      security: 85
      ux: 30
      ecosystem: 70
    communityData:
      stars: 142
      forks: 43
      contributors: 2
      openIssues: 1
      lastCommit: "2026-05-25"
    tags: ["JavaScript", "Governance", "Meta-Agent", "MIT", "Multi-Platform"]
    analysis:
      strengths: >
        目前唯一的 AI Coding Agent 治理层方案。
        9 个 Specialist Meta-Agents 分工明确，8 阶段执行骨架从意图确认到进化写回形成闭环。
        3 层记忆系统（Markdown + 代码图谱 + 向量检索）保证跨会话连续性。
        安全治理维度评分最高（85）。
      weaknesses: >
        社区极小（141 stars，2 contributors），单点维护风险。
        安装复杂，概念多（9 Agent / 8 阶段 / 10 Dealing Cards / 3 层记忆），学习曲线陡峭。
        不适用模型兼容性评估。
      positioning: >
        AI 编码的「操作系统层」——不是替代 Coding Agent，
        而是给 Agent 加上治理、审查、进化的闭环。
        如果 Waza 是「技能」，Meta_Kim 就是「流程」。
        理念超前，但社区和文档需要时间追赶。
      audience: >
        对 AI 编码质量有高要求的团队；
        需要审计、合规、知识沉淀的企业用户；
        愿意投入时间建立治理体系的早期采用者。
    milestones:
      - date: "2025-Q4"
        title: "项目启动"
        description: "AI 治理层概念验证"
      - date: "2026-05"
        title: "架构成熟"
        description: "9 Agent / 8 阶段 / 3 层记忆完整体系"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate YAML data files
        run: node -e "
          const yaml = require('js-yaml');
          const fs = require('fs');
          const path = require('path');

          // Validate projects.yaml
          const p = yaml.load(fs.readFileSync('src/data/projects.yaml','utf8'));
          if(!p.projects || !Array.isArray(p.projects)) throw new Error('Invalid projects.yaml: missing projects array');
          const requiredFields = ['id','name','category','repo','description','scores','communityData','tags'];
          const validCategories = ['agent','terminal','skills','governance'];
          p.projects.forEach((pr,i)=>{
            requiredFields.forEach(k=>{if(pr[k]===undefined) throw new Error('Project '+i+' ('+(pr.id||'?')+') missing field: '+k)});
            if(!validCategories.includes(pr.category)) throw new Error('Project '+i+' invalid category: '+pr.category);
          });
          console.log('  projects.yaml: '+p.projects.length+' projects valid');

          // Validate dimensions.yaml
          const d = yaml.load(fs.readFileSync('src/data/dimensions.yaml','utf8'));
          if(!d.dimensions || !Array.isArray(d.dimensions)) throw new Error('Invalid dimensions.yaml');
          d.dimensions.forEach((dim,i)=>{
            if(!dim.id||!dim.name||typeof dim.weight!=='number') throw new Error('Dimension '+i+' missing required fields');
            if(dim.applicableCategories) dim.applicableCategories.forEach(c=>{
              if(!validCategories.includes(c)) throw new Error('Dimension '+dim.id+' invalid category: '+c);
            });
          });
          console.log('  dimensions.yaml: '+d.dimensions.length+' dimensions valid');
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run smoke tests
        run: npm test

  build:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx astro check
      - name: Build site
        run: npm run build
      - name: Check no hardcoded base paths in built output
        run: |
          if grep -r '/skills123\.cc' dist/ --include='*.html' 2>/dev/null; then
            echo "ERROR: Found hardcoded base path '/skills123.cc' in built HTML"
            exit 1
          fi
          echo "  No hardcoded base paths found"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

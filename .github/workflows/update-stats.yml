name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * 1"  # 每周一早 6 点 UTC
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest GitHub stats
        run: node scripts/fetch-github-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update GitHub community data"
          title: "chore: update GitHub community data"
          body: |
            自动更新各项目的 GitHub 社区数据（stars、forks、contributors）。

            由 update-stats.yml 工作流触发。
          branch: auto/update-stats
          delete-branch: true
          labels: automated
